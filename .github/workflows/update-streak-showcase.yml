name: Update streak showcase

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-streak-showcase.yml"
      - "scripts/generate-streak-showcase.js"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate streak showcase
        run: node scripts/generate-streak-showcase.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: KOUSHIKG04
          STREAK_FROM: "2021-12-21"

      - name: Commit updated SVG
        run: |
          if git diff --quiet -- streak-cards.svg; then
            echo "No streak showcase changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add streak-cards.svg
          git commit -m "Update streak showcase"
          git push

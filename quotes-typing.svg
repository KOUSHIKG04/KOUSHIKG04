<svg width="1000" height="130" viewBox="0 0 1000 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: "Fira Code", Consolas, monospace;
      fill: #f7f7f7;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .quote {
      font-size: 18px;
      font-weight: 600;
    }

    .meaning {
      font-size: 15px;
    }

    .group {
      opacity: 0;
      animation: show 50s linear infinite;
    }

    .mask-quote,
    .mask-meaning {
      animation: type 50s linear infinite;
    }

    #group-1 { animation-name: show-1; }
    #group-2 { animation-name: show-2; }
    #group-3 { animation-name: show-3; }
    #group-4 { animation-name: show-4; }
    #group-5 { animation-name: show-5; }

    #quote-mask-1 { animation-name: type-quote-1; }
    #meaning-mask-1 { animation-name: type-meaning-1; }
    #quote-mask-2 { animation-name: type-quote-2; }
    #meaning-mask-2 { animation-name: type-meaning-2; }
    #quote-mask-3 { animation-name: type-quote-3; }
    #meaning-mask-3 { animation-name: type-meaning-3; }
    #quote-mask-4 { animation-name: type-quote-4; }
    #meaning-mask-4 { animation-name: type-meaning-4; }
    #quote-mask-5 { animation-name: type-quote-5; }
    #meaning-mask-5 { animation-name: type-meaning-5; }

    @keyframes show-1 {
      0%, 18% { opacity: 1; }
      19.5%, 99.9% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes show-2 {
      0%, 19.9% { opacity: 0; }
      20%, 38% { opacity: 1; }
      39.5%, 100% { opacity: 0; }
    }

    @keyframes show-3 {
      0%, 39.9% { opacity: 0; }
      40%, 58% { opacity: 1; }
      59.5%, 100% { opacity: 0; }
    }

    @keyframes show-4 {
      0%, 59.9% { opacity: 0; }
      60%, 78% { opacity: 1; }
      79.5%, 100% { opacity: 0; }
    }

    @keyframes show-5 {
      0%, 79.9% { opacity: 0; }
      80%, 98% { opacity: 1; }
      99.5%, 100% { opacity: 0; }
    }

    @keyframes type-quote-1 {
      0% { width: 0; }
      5% { width: 1000px; }
      19.9% { width: 1000px; }
      20%, 100% { width: 0; }
    }

    @keyframes type-meaning-1 {
      0%, 5% { width: 0; }
      14% { width: 1000px; }
      19.9% { width: 1000px; }
      20%, 100% { width: 0; }
    }

    @keyframes type-quote-2 {
      0%, 20% { width: 0; }
      25% { width: 1000px; }
      39.9% { width: 1000px; }
      40%, 100% { width: 0; }
    }

    @keyframes type-meaning-2 {
      0%, 25% { width: 0; }
      34% { width: 1000px; }
      39.9% { width: 1000px; }
      40%, 100% { width: 0; }
    }

    @keyframes type-quote-3 {
      0%, 40% { width: 0; }
      45% { width: 1000px; }
      59.9% { width: 1000px; }
      60%, 100% { width: 0; }
    }

    @keyframes type-meaning-3 {
      0%, 45% { width: 0; }
      54% { width: 1000px; }
      59.9% { width: 1000px; }
      60%, 100% { width: 0; }
    }

    @keyframes type-quote-4 {
      0%, 60% { width: 0; }
      65% { width: 1000px; }
      79.9% { width: 1000px; }
      80%, 100% { width: 0; }
    }

    @keyframes type-meaning-4 {
      0%, 65% { width: 0; }
      74% { width: 1000px; }
      79.9% { width: 1000px; }
      80%, 100% { width: 0; }
    }

    @keyframes type-quote-5 {
      0%, 80% { width: 0; }
      85% { width: 1000px; }
      99.5% { width: 1000px; }
      100% { width: 0; }
    }

    @keyframes type-meaning-5 {
      0%, 85% { width: 0; }
      94% { width: 1000px; }
      99.5% { width: 1000px; }
      100% { width: 0; }
    }
  </style>

  <defs>
    <clipPath id="clip-quote-1"><rect id="quote-mask-1" class="mask-quote" x="0" y="24" width="0" height="28"/></clipPath>
    <clipPath id="clip-meaning-1"><rect id="meaning-mask-1" class="mask-meaning" x="0" y="64" width="0" height="28"/></clipPath>
    <clipPath id="clip-quote-2"><rect id="quote-mask-2" class="mask-quote" x="0" y="24" width="0" height="28"/></clipPath>
    <clipPath id="clip-meaning-2"><rect id="meaning-mask-2" class="mask-meaning" x="0" y="64" width="0" height="28"/></clipPath>
    <clipPath id="clip-quote-3"><rect id="quote-mask-3" class="mask-quote" x="0" y="24" width="0" height="28"/></clipPath>
    <clipPath id="clip-meaning-3"><rect id="meaning-mask-3" class="mask-meaning" x="0" y="64" width="0" height="28"/></clipPath>
    <clipPath id="clip-quote-4"><rect id="quote-mask-4" class="mask-quote" x="0" y="24" width="0" height="28"/></clipPath>
    <clipPath id="clip-meaning-4"><rect id="meaning-mask-4" class="mask-meaning" x="0" y="64" width="0" height="28"/></clipPath>
    <clipPath id="clip-quote-5"><rect id="quote-mask-5" class="mask-quote" x="0" y="24" width="0" height="28"/></clipPath>
    <clipPath id="clip-meaning-5"><rect id="meaning-mask-5" class="mask-meaning" x="0" y="64" width="0" height="28"/></clipPath>
  </defs>

  <g id="group-1" class="group">
    <text class="quote" x="500" y="38" clip-path="url(#clip-quote-1)">"Karmanye vadhikaraste ma phaleshu kadachana."</text>
    <text class="meaning" x="500" y="78" clip-path="url(#clip-meaning-1)">You have a right to perform your duty, but not to the fruits of your actions.</text>
  </g>

  <g id="group-2" class="group">
    <text class="quote" x="500" y="38" clip-path="url(#clip-quote-2)">"Yogaḥ karmasu kauśalam."</text>
    <text class="meaning" x="500" y="78" clip-path="url(#clip-meaning-2)">Excellence in action is Yoga.</text>
  </g>

  <g id="group-3" class="group">
    <text class="quote" x="500" y="38" clip-path="url(#clip-quote-3)">"Na hi kalyāṇa-kṛt kaścid durgatiṁ tāta gacchati."</text>
    <text class="meaning" x="500" y="78" clip-path="url(#clip-meaning-3)">One who does good work never meets a bad end.</text>
  </g>

  <g id="group-4" class="group">
    <text class="quote" x="500" y="38" clip-path="url(#clip-quote-4)">"Uddhared ātmanātmānaṁ nātmānam avasādayet."</text>
    <text class="meaning" x="500" y="78" clip-path="url(#clip-meaning-4)">Lift yourself by yourself; do not degrade yourself.</text>
  </g>

  <g id="group-5" class="group">
    <text class="quote" x="500" y="38" clip-path="url(#clip-quote-5)">"Sukha-duḥkhe same kṛtvā lābhālābhau jayājayau."</text>
    <text class="meaning" x="500" y="78" clip-path="url(#clip-meaning-5)">Treat success and failure, gain and loss, alike.</text>
  </g>
</svg>
